{% extends "base.html" %}

{% block title %}{{ business_name }} - Login{% endblock %}

{% block body %}
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <div class="brand-icon" style="width: 56px; height: 56px; margin: 0 auto 16px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <h1 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">{{ business_name }}</h1>
            <p style="color: var(--text-subtle); font-size: 0.875rem;">Sign in to your Command Center</p>
        </div>

        <form method="POST" action="/admin/login" style="margin-top: 32px;">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 12px;">
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 24px; color: var(--text-subtle); font-size: 0.75rem;">
            Powered by Command Center CRM
        </p>
    </div>
</div>
{% endblock %}
